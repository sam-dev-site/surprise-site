<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marlyn’s Design Challenge</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="topbar">
    <div class="container topbar__inner">
      <div class="brand">
        <div class="brand__mark" id="brandMark">
  <span id="brandLetter">M</span>
</div>
        <div class="brand__text">
          <div class="brand__title">Design of the Week</div>
          <div class="brand__subtitle">for Marlyn</div>
        </div>
      </div>

      <div class="meta">
        <div class="pill" id="weekPill">Week —</div>
        <div class="pill pill--muted" id="themePill">Theme —</div>
      </div>
    </div>
  </header>

  <main class="container layout">

    <!-- LEFT PANEL -->
    <section class="panel prompt" aria-labelledby="promptTitle">

      <div class="prompt__header">
        <h1 id="promptTitle">This week’s prompt:</h1>
      </div>

      <div class="prompt__body">

        <h2 class="prompt__name" id="weeklyTitle">—</h2>
        <p class="prompt__text" id="weeklyText">—</p>

<div class="prompt__actions">
  <button class="btn btn--ghost" id="copyBtn" type="button">
    Copy prompt
  </button>
</div>

        <div class="toast" id="toast" hidden>Copied.</div>

        <!-- ARCHIVE -->
        <div class="archive">
          <button class="btn btn--ghost archiveToggle"
                  id="archiveToggle"
                  type="button"
                  aria-expanded="false">
            Show previous weeks
          </button>

          <div class="archive__panel" id="archivePanel" hidden>
            <div id="archiveList"></div>
          </div>
        </div>

      </div>
    </section>

    <!-- RIGHT PANEL -->
    <aside class="panel visuals" aria-label="Theme visuals">

      <div class="visuals__header">
        <h2>Visual direction</h2>
        <p id="visualNote" class="muted">
          Palette samples.
        </p>
      </div>

      <div class="visuals__grid">
        <div class="artcard" id="artA"></div>
        <div class="artcard" id="artB"></div>
        <div class="artcard" id="artC"></div>
      </div>

      <div class="palette">
        <div class="palette__row" id="paletteRow"></div>
        <div class="palette__meta">
          <div class="muted">Palette</div>
          <div class="mono" id="paletteText">—</div>
        </div>
      </div>

      <div class="tips">
        <h3>Optional constraints</h3>
        <ul id="tipsList">
          <li>—</li>
        </ul>
      </div>

    </aside>
  </main>

  <footer class="container footer">
    <div>Made for Marlyn’s weekly pattern practice.</div>
    <div>© <span id="year"></span></div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
